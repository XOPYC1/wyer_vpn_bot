<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyer VPN - Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Использование системных цветов Telegram */
        body { 
            background-color: var(--tg-theme-bg-color); 
            color: var(--tg-theme-text-color); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* Карточки с фоном из темы */
        .card { 
            background-color: var(--tg-theme-secondary-bg-color); 
            border-radius: 24px; 
            border: 1px solid rgba(0,0,0,0.05); 
        }
        
        /* Активная вкладка */
        .tab-active { 
            border-bottom: 3px solid var(--tg-theme-button-color); 
            color: var(--tg-theme-button-color); 
            font-weight: bold; 
        }
        
        /* Стилизация всех кнопок под тему */
        .button-theme { 
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border-radius: 9999px; 
            transition: all 0.2s ease; 
        }
        
        /* Поля ввода и выпадающий список */
        select, textarea { 
            background-color: var(--tg-theme-bg-color); 
            color: var(--tg-theme-text-color); 
            border-radius: 16px; 
            border: 1px solid rgba(0,0,0,0.1); 
            padding-right: 2rem;
            appearance: none;
            -webkit-appearance: none;
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 0.65rem auto;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23888888%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E');
        }
        
        /* QR-код */
        #qrcode img { margin: 0 auto; display: block; }
    </style>
</head>
<body class="p-4 text-sm">

    <div class="text-center mb-6 pt-2">
        <h1 class="text-4xl font-extrabold text-blue-500 tracking-tighter">Wyer VPN</h1>
    </div>

    <div class="flex justify-around mb-6 border-b border-gray-200">
        <button onclick="showTab('profile')" class="tab-button tab-active p-4 flex-1 text-center" id="btn-profile">👤 Профиль</button>
        <button onclick="showTab('subscription')" class="tab-button p-4 flex-1 text-center" id="btn-subscription">💎 Подписка</button>
        <button onclick="showTab('support')" class="tab-button p-4 flex-1 text-center" id="btn-support">💬 Support</button>
    </div>

    <div id="profile" class="tab-content space-y-4">
        <div class="card p-6 space-y-5">
            <div class="flex items-center gap-4">
                <img id="user-avatar" src="" class="rounded-full w-16 h-16 border-4 border-blue-100 hidden" alt="Avatar">
                <div id="avatar-placeholder" class="rounded-full w-16 h-16 border-4 border-blue-100 flex items-center justify-center text-2xl bg-gray-200 font-bold">👤</div>
                <div>
                    <p class="text-2xl font-bold tracking-tight" id="user-name">@username</p>
                    <p class="text-xs opacity-60">ID: <span id="user-id">000000</span></p>
                </div>
            </div>
            
            <div class="border-t border-gray-100 pt-4 space-y-3">
                <div class="flex justify-between items-center p-3 rounded-xl bg-gray-50/50">
                    <span class="font-medium opacity-80">Баланс:</span>
                    <span class="font-bold text-xl text-green-600" id="user-balance">0$</span>
                </div>
                <div class="flex justify-between items-center p-3 rounded-xl bg-gray-50/50">
                    <span class="font-medium opacity-80">Уровень:</span>
                    <span class="font-bold text-lg" id="user-lvl">0</span>
                </div>
                <div class="flex justify-between items-center p-3 rounded-xl bg-gray-50/50">
                    <span class="font-medium opacity-80">Скидка:</span>
                    <span class="font-bold text-lg text-blue-500" id="user-discount">0%</span>
                </div>
            </div>
        </div>
    </div>

    <div id="subscription" class="tab-content space-y-4 hidden">
        <div class="card p-5 space-y-4">
            <div class="text-center bg-blue-50 p-3 rounded-xl">
                <p class="text-sm">Активна до: <span id="sub-date" class="text-blue-700 font-bold">20.03.2026</span></p>
            </div>
            
            <div class="flex justify-center items-center bg-white p-4 rounded-3xl shadow-inner">
                <div id="qrcode"></div>
            </div>
            
            <div>
                <label class="block mb-2 font-bold opacity-80">Ссылка VLESS:</label>
                <textarea id="vless-link" class="w-full p-4 text-xs h-20" readonly></textarea>
            </div>
            
            <div>
                <label class="block mb-2 font-bold opacity-80">Выберите тариф:</label>
                <select id="tariff-select" class="w-full p-4 font-bold text-base">
                    <option value="7">7 дней - 0.5$</option>
                    <option value="30">1 месяц - 1.5$</option>
                    <option value="90">3 месяца - 4$</option>
                    <option value="365">1 год - 12$</option>
                </select>
            </div>
            
            <button onclick="buySubscription()" class="button-theme w-full p-5 font-extrabold text-lg shadow-lg">
                💎 Оплатить
            </button>
        </div>
    </div>

    <div id="support" class="tab-content hidden">
        <div class="card p-6 text-center space-y-4">
            <h2 class="text-2xl font-bold">Техническая поддержка</h2>
            <p class="opacity-70">Возникли проблемы? Напишите нам, мы ответим в течение 15 минут.</p>
            <a href="https://t.me/WyerVPNsupportBot" class="button-theme inline-block w-full p-4 font-bold text-base shadow-md">
                💬 Написать боту
            </a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe?.user;

        if (user) {
            document.getElementById('user-id').innerText = user.id;
            document.getElementById('user-name').innerText = user.first_name || "@" + user.username;
            if (user.photo_url) {
                const avatarImg = document.getElementById('user-avatar');
                const placeholder = document.getElementById('avatar-placeholder');
                avatarImg.src = user.photo_url;
                avatarImg.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }
        }

        const balance = 0; 
        document.getElementById('user-balance').innerText = balance + "$";
        const level = Math.floor(balance / 5); 
        document.getElementById('user-lvl').innerText = level;
        document.getElementById('user-discount').innerText = (level * 1) + "%";

        const vlessLink = "vless://example@77.91.84.106:443?type=grpc&serviceName=grpc#WyerVPN";
        document.getElementById('vless-link').value = vlessLink;

        new QRCode(document.getElementById("qrcode"), {
            text: vlessLink, width: 170, height: 170, correctLevel: QRCode.CorrectLevel.H
        });

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('tab-active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        }

        function buySubscription() {
            const days = document.getElementById("tariff-select").value;
            tg.sendData(JSON.stringify({action: "buy_sub", days: days}));
            tg.showAlert("Обрабатываю заказ, перехожу к оплате в чате...");
            tg.close();
        }
    </script>
</body>
</html>
