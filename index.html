<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyer VPN - Профиль</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); text-align: center; padding: 20px; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; }
        .key-text { word-break: break-all; background: var(--tg-theme-secondary-bg-color); padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 10px; }
        .status-active { color: green; font-weight: bold; }
        .status-expired { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>💎 Моя подписка</h1>
    <p>Статус: <span id="status">Загрузка...</span></p>
    <p>Действует до: <span id="expires">...</span></p>
    
    <div id="qrcode"></div>
    <div class="key-text" id="key">Загрузка ключа...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Получаем ID пользователя из URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('uid');

        // 2. !!! ЗАГЛУШКА !!!
        // В реальной жизни тут нужен fetch('/api/user_info?id=' + userId)
        // Но пока что мы просто показываем, что QR генерируется тут.
        const vlessLink = "vless://ВАШ-UUID-ИЗ-БАЗЫ@77.91.84.106:443?security=reality&sni=www.apple.com&fp=chrome&type=tcp&flow=xtls-rprx-vision&pbk=yrhww5KokWmb-NHQoyV6G44OfBly5Q2BVxw5ZJ3CqD4&sid=a7#WyerVPN";
        const subExpires = "31.12.2025";
        const isActive = true;

        // 3. Отображение данных
        document.getElementById('key').innerText = vlessLink;
        document.getElementById('status').innerText = isActive ? "Активна" : "Истекла";
        document.getElementById('status').className = isActive ? "status-active" : "status-expired";
        document.getElementById('expires').innerText = subExpires;

        // 4. Генерация QR-кода прямо в браузере телефона
        QRCode.toCanvas(document.getElementById('qrcode'), vlessLink, { width: 200, margin: 1 });
        
    </script>
</body>
</html>
