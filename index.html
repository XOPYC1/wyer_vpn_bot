<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyer VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Применяем цвета из темы Telegram */
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .card { background-color: var(--tg-theme-secondary-bg-color); }
        .btn-primary { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }
    </style>
</head>
<body class="p-4 font-sans">
    
    <div class="card rounded-xl p-4 shadow-lg mb-6 text-center">
        <h1 id="user-name" class="text-xl font-bold">Загрузка...</h1>
    </div>

    <div class="space-y-4">
        
        <div class="card p-4 rounded-xl flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🇸🇪</span>
                <div>
                    <h2 class="font-bold text-lg">Швеция</h2>
                </div>
            </div>
            <button onclick="openVpn('v2raytun://install-config?url=http://77.91.84.106:2096/sub/ego95km8cmaejnni')" class="btn-primary px-5 py-2.5 rounded-full text-sm font-bold shadow-md">
                Подключить
            </button>
        </div>
        
        <div class="card p-4 rounded-xl flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🇺🇸</span>
                <div>
                    <h2 class="font-bold text-lg">США</h2>
                </div>
            </div>
            <button onclick="openVpn('v2raytun://install-config?url=http://77.91.84.106:2096/sub/ego95km8cmaejnni')" class="btn-primary px-5 py-2.5 rounded-full text-sm font-bold shadow-md">
                Подключить
            </button>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрыть на весь экран
        
        // Получение данных пользователя
        try {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('user-name').innerText = "Привет, " + user.first_name;
            } else {
                document.getElementById('user-name').innerText = "Привет, Пользователь";
            }
        } catch (e) {
            document.getElementById('user-name').innerText = "Привет, Гость";
        }

        // Функция открытия VPN приложения через API Telegram
        function openVpn(url) {
            if (window.Telegram.WebApp.openLink) {
                window.Telegram.WebApp.openLink(url);
            } else {
                window.location.href = url;
            }
        }
    </script>
</body>
</html>
