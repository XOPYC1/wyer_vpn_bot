<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyer VPN App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .card { background-color: var(--tg-theme-secondary-bg-color); border: 1px solid rgba(0,0,0,0.1); }
        .tab-active { border-bottom: 2px solid var(--tg-theme-button-color); color: var(--tg-theme-button-color); font-weight: bold; }
        #qrcode img { width: 100%; height: auto; } /* QR растягивается по контейнеру */
    </style>
</head>
<body class="p-4 font-sans text-sm">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-extrabold text-blue-500">Wyer VPN</h1>
    </div>

    <div class="flex justify-around mb-6 border-b border-gray-300">
        <button onclick="showTab('profile')" class="tab-button tab-active p-2" id="btn-profile">Профиль</button>
        <button onclick="showTab('subscription')" class="tab-button p-2" id="btn-subscription">Подписка</button>
        <button onclick="showTab('support')" class="tab-button p-2" id="btn-support">Поддержка</button>
    </div>

    <div id="profile" class="tab-content space-y-4">
        <div class="card p-5 rounded-2xl shadow-lg space-y-3">
            <div class="flex items-center gap-3">
                <div class="bg-gray-300 rounded-full w-12 h-12 flex items-center justify-center text-xl">👤</div>
                <div>
                    <p class="text-lg font-bold" id="user-name">@username</p>
                    <p class="text-xs opacity-70">ID: <span id="user-id">000000</span></p>
                </div>
            </div>
            <div class="border-t border-gray-200 pt-3 flex justify-between">
                <span>Баланс:</span>
                <span class="font-bold text-lg text-green-500" id="user-balance">0$</span>
            </div>
            <div class="flex justify-between">
                <span>Уровень:</span>
                <span class="font-bold" id="user-lvl">0</span>
            </div>
            <div class="flex justify-between">
                <span>Скидка:</span>
                <span class="font-bold" id="user-discount">0%</span>
            </div>
        </div>
    </div>

    <div id="subscription" class="tab-content space-y-4 hidden">
        <div class="card p-4 rounded-xl shadow-md space-y-3">
            <p><strong>Активна до:</strong> <span id="sub-date" class="text-blue-500 font-bold">...</span></p>
            
            <div class="bg-white p-2 rounded-lg flex justify-center items-center">
                <div id="qrcode" style="width:180px; height:180px;"></div>
            </div>
            
            <p class="font-bold">Ссылка VLESS:</p>
            <textarea id="vless-link" class="w-full p-3 rounded bg-white text-black text-xs h-24" readonly></textarea>
            <button onclick="copyLink()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Скопировать ссылку</button>
        </div>
    </div>

    <div id="support" class="tab-content hidden text-center">
        <div class="card p-6 rounded-xl shadow-md">
            <p class="mb-4">Нужна помощь? Напишите в поддержку:</p>
            <a href="https://t.me/WyerVPNsupportBot" class="bg-blue-600 text-white p-3 rounded-lg font-bold">Открыть чат с поддержкой</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-id').innerText = user.id;
            document.getElementById('user-name').innerText = "@" + user.username;
        }

        // --- ЛОГИКА ---
        const balance = 0; // Начнем с 0 для проверки 0 уровня
        document.getElementById('user-balance').innerText = balance + "$";
        
        // Уровень 0 при балансе 0, +1 каждые 5$
        const level = Math.floor(balance / 5); 
        const discount = level * 1; 
        
        document.getElementById('user-lvl').innerText = level;
        document.getElementById('user-discount').innerText = discount + "%";

        const vlessLink = "vless://example@77.91.84.106:443?type=grpc&serviceName=grpc#WyerVPN";
        document.getElementById('sub-date').innerText = "20.03.2026";
        document.getElementById('vless-link').value = vlessLink;

        // --- ГЕНЕРАЦИЯ QR-КОДА ---
        new QRCode(document.getElementById("qrcode"), {
            text: vlessLink,
            width: 180,
            height: 180,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('tab-active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        }

        function copyLink() {
            const copyText = document.getElementById("vless-link");
            copyText.select();
            document.execCommand("copy");
            tg.showAlert("Ссылка скопирована!");
        }
    </script>
</body>
</html>
