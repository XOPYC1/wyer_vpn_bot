<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyer VPN - Панель управления</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Стилизация под тему Telegram */
        body { 
            background-color: var(--tg-theme-bg-color); 
            color: var(--tg-theme-text-color); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        .card { 
            background-color: var(--tg-theme-secondary-bg-color); 
            border-radius: 20px; 
            border: 1px solid rgba(0,0,0,0.05); 
        }
        .button-theme { 
            background-color: var(--tg-theme-button-color); 
            color: var(--tg-theme-button-text-color); 
            border-radius: 999px; 
            transition: all 0.2s ease;
        }
        .stat-item { 
            background-color: var(--tg-theme-bg-color); 
        }
        .tab-active { 
            border-bottom: 2px solid var(--tg-theme-button-color); 
            color: var(--tg-theme-button-color); 
            font-weight: bold; 
        }
    </style>
</head>
<body class="p-4 text-sm pt-10">

    <div class="text-center mb-6">
        <h1 class="text-4xl font-extrabold text-blue-500 tracking-tighter">Wyer VPN</h1>
    </div>

    <div class="flex justify-around mb-6 border-b border-gray-200">
        <button onclick="showTab('profile')" class="tab-button tab-active p-3 flex-1 text-center" id="btn-profile">👤 Профиль</button>
        <button onclick="showTab('promo')" class="tab-button p-3 flex-1 text-center" id="btn-promo">🎁 Промо</button>
        <button onclick="showTab('admin')" class="tab-button p-3 flex-1 text-center hidden" id="btn-admin">🛠️ Админ</button>
    </div>

    <div id="profile" class="tab-content space-y-4">
        <div class="card p-6 space-y-4">
            <p class="text-2xl font-bold" id="user-name">Загрузка...</p>
            
            <div class="flex justify-between items-center p-4 rounded-xl stat-item">
                <span class="font-medium opacity-80">Баланс:</span>
                <span class="font-bold text-xl text-green-600" id="user-balance">0$</span>
            </div>

            <div class="flex gap-2">
                <input type="number" id="topup-amount" placeholder="Сумма ($)" class="flex-grow p-4 rounded-full border bg-white/5">
                <button onclick="topUp()" class="p-4 px-6 font-bold button-theme">➕ Пополнить</button>
            </div>
        </div>
    </div>

    <div id="promo" class="tab-content hidden">
        <div class="card p-6 space-y-4">
            <h2 class="text-lg font-bold text-center">🎁 Введите промокод</h2>
            <input type="text" id="promo-code" placeholder="PROMO2026" class="w-full p-4 rounded-full border text-center bg-white/5 uppercase">
            <button onclick="activatePromo()" class="w-full p-4 font-bold button-theme">Активировать</button>
        </div>
    </div>

    <div id="admin" class="tab-content hidden">
        <div class="card p-6 space-y-4">
            <h2 class="text-xl font-bold text-center text-red-500">🛠️ Админ панель</h2>
            
            <div class="space-y-2">
                <input type="number" id="target-id" placeholder="ID пользователя" class="w-full p-4 rounded-full border bg-white/5">
                <input type="number" id="give-amount" placeholder="Сумма ($)" class="w-full p-4 rounded-full border bg-white/5">
                <button onclick="adminGive()" class="w-full p-4 font-bold bg-red-500 text-white rounded-full">💰 Выдать баланс</button>
            </div>

            <hr class="border-gray-200">

            <div class="space-y-2">
                <input type="text" id="admin-promo-code" placeholder="Код промокода" class="w-full p-4 rounded-full border bg-white/5">
                <input type="number" id="admin-promo-amount" placeholder="Сумма ($)" class="w-full p-4 rounded-full border bg-white/5">
                <button onclick="adminPromo()" class="w-full p-4 font-bold bg-green-500 text-white rounded-full">➕ Создать промо</button>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Получение данных пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name || "Пользователь";
        }

        // Показать вкладку админа только для указанного ID
        if (user && user.id === 8506833729) {
            document.getElementById('btn-admin').classList.remove('hidden');
        }

        // Переключение вкладок
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('tab-active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        }

        // Функция: Пополнение баланса
        function topUp() {
            const amount = document.getElementById('topup-amount').value;
            if(!amount || amount <= 0) return tg.showAlert("Введите корректную сумму");
            tg.sendData(JSON.stringify({action: "topup", amount: amount}));
        }
        
        // Функция: Активация промокода
        function activatePromo() {
            const code = document.getElementById('promo-code').value;
            if(!code) return tg.showAlert("Введите промокод");
            tg.sendData(JSON.stringify({action: "activate_promo", code: code}));
        }

        // Функция: Админ - Выдать баланс
        function adminGive() {
            const target_id = document.getElementById('target-id').value;
            const amount = document.getElementById('give-amount').value;
            if(!target_id || !amount) return tg.showAlert("Заполните ID и сумму");
            tg.sendData(JSON.stringify({action: "admin_give", target_id: target_id, amount: amount}));
        }

        // Функция: Админ - Создать промокод
        function adminPromo() {
            const code = document.getElementById('admin-promo-code').value;
            const amount = document.getElementById('admin-promo-amount').value;
            if(!code || !amount) return tg.showAlert("Заполните код и сумму");
            tg.sendData(JSON.stringify({action: "admin_promo", code: code, amount: amount}));
        }
    </script>
</body>
</html>
