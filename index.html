<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyer VPN App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .card { background-color: var(--tg-theme-secondary-bg-color); }
        .btn-primary { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }
    </style>
</head>
<body class="p-4 font-sans">
    <div class="card rounded-xl p-4 shadow-lg mb-4 text-center">
        <img id="user-photo" class="w-16 h-16 rounded-full mx-auto mb-2 border-2 border-blue-500" src="https://via.placeholder.com/80">
        <h1 id="user-name" class="text-lg font-bold">Загрузка...</h1>
    </div>

    <div class="space-y-3">
        <div class="card p-3 rounded-lg flex justify-between items-center">
            <div>
                <span class="text-xl">🇸🇪</span> Швеция — Быстрый ⚡️
            </div>
            <a href="vless://..." class="btn-primary px-4 py-2 rounded-md text-sm font-bold">ПОДКЛЮЧИТЬ</a>
        </div>
        
        <div class="card p-3 rounded-lg flex justify-between items-center">
            <div>
                <span class="text-xl">🇺🇸</span> США — YouTube 🎬
            </div>
            <a href="vless://..." class="btn-primary px-4 py-2 rounded-md text-sm font-bold">ПОДКЛЮЧИТЬ</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
            if (user.photo_url) document.getElementById('user-photo').src = user.photo_url;
        }
    </script>
</body>
</html>
