<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyer VPN - Профиль</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .card { background-color: var(--tg-theme-secondary-bg-color); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-btn { border-bottom: 2px solid var(--tg-theme-button-color); color: var(--tg-theme-button-color); }
    </style>
</head>
<body class="p-4">
    <h1 class="text-2xl font-bold text-center mb-6">💎 Моя подписка</h1>
    
    <div class="card p-5 rounded-2xl mb-6 text-center">
        <p class="text-sm opacity-70">Статус</p>
        <p class="font-bold text-lg text-green-500" id="sub-status">Активна</p>
        <p class="text-xs opacity-50 mt-2" id="sub-expires">Истекает: 01.01.2025</p>
    </div>

    <h2 class="text-xl font-bold text-center mb-4">📖 Инструкции</h2>
    <div class="flex justify-around border-b mb-4 text-sm font-bold">
        <button onclick="showTab('android')" class="tab-btn active-btn pb-2" id="btn-android">Android</button>
        <button onclick="showTab('ios')" class="tab-btn pb-2" id="btn-ios">iOS</button>
        <button onclick="showTab('win')" class="tab-btn pb-2" id="btn-win">Win</button>
    </div>

    <div id="tab-android" class="tab-content active card p-4 rounded-xl text-sm space-y-2">
        <p>1. Установите <b>V2rayTUN</b>.</p>
        <p>2. Скопируйте ключ из бота.</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ВАЖНО: Тут логика получения данных подписки из бота (через API)
        // Пока заглушка
        document.getElementById('sub-status').innerText = "Активна";
        
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active-btn'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active-btn');
        }
    </script>
</body>
</html>
