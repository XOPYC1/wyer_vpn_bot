<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyer VPN - Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .card { background-color: var(--tg-theme-secondary-bg-color); border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); }
        .tab-active { border-bottom: 3px solid var(--tg-theme-button-color); color: var(--tg-theme-button-color); font-weight: bold; }
        .button-theme { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border-radius: 9999px; transition: all 0.2s ease; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background-color: var(--tg-theme-bg-color); }
        textarea { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); }
        .stat-item { background-color: var(--tg-theme-bg-color); }
        #qrcode img { margin: 0 auto; display: block; }
    </style>
</head>
<body class="p-4 text-sm">

    <div class="text-center mb-6 pt-2">
        <h1 class="text-4xl font-extrabold text-blue-500 tracking-tighter">Wyer VPN</h1>
    </div>

    <div class="flex justify-around mb-6 border-b border-gray-200 text-xs">
        <button onclick="showTab('profile')" class="tab-button tab-active p-4 flex-1 text-center" id="btn-profile">👤 Профиль</button>
        <button onclick="showTab('subscription')" class="tab-button p-4 flex-1 text-center" id="btn-subscription">💎 Моя подписка</button>
        <button onclick="showTab('buy')" class="tab-button p-4 flex-1 text-center" id="btn-buy">🛒 Купить</button>
        <button onclick="showTab('support')" class="tab-button p-4 flex-1 text-center" id="btn-support">💬 Help</button>
    </div>

    <div id="profile" class="tab-content space-y-4">
        <div class="card p-6 space-y-5">
            <div class="flex items-center gap-4">
                <img id="user-avatar" src="" class="rounded-full w-16 h-16 border-4 border-blue-100 hidden" alt="Avatar">
                <div id="avatar-placeholder" class="rounded-full w-16 h-16 border-4 border-blue-100 flex items-center justify-center text-2xl bg-gray-200 font-bold">👤</div>
                <div>
                    <p class="text-2xl font-bold tracking-tight" id="user-name">@username</p>
                    <p class="text-xs opacity-60">ID: <span id="user-id">000000</span></p>
                </div>
            </div>
            <div class="border-t border-gray-100 pt-4 space-y-3">
                <div class="flex justify-between items-center p-3 rounded-xl stat-item">
                    <span class="font-medium opacity-80" style="color: var(--tg-theme-text-color)">Баланс:</span>
                    <span class="font-bold text-xl text-green-600" id="user-balance">0$</span>
                </div>
            </div>
        </div>
    </div>

    <div id="subscription" class="tab-content space-y-4 hidden">
        <div class="card p-5 space-y-4">
            <div class="text-center p-3 rounded-xl stat-item">
                <p class="text-sm" style="color: var(--tg-theme-text-color)">Активна до: <span id="sub-date" class="font-bold" style="color: var(--tg-theme-button-color)">Нет подписки</span></p>
            </div>
            
            <div id="qr-container" class="flex justify-center items-center bg-white p-4 rounded-3xl shadow-inner hidden">
                <div id="qrcode"></div>
            </div>
            
            <div>
                <label class="block mb-2 font-bold opacity-80" style="color: var(--tg-theme-text-color)">Ссылка VLESS:</label>
                <textarea id="vless-link" class="w-full p-4 text-xs h-20" readonly></textarea>
            </div>
            
            <button onclick="deleteSubscription()" class="w-full p-4 font-bold text-sm bg-red-100 text-red-600 rounded-full hover:bg-red-200">
                🗑️ Удалить подписку
            </button>
        </div>
    </div>

    <div id="buy" class="tab-content space-y-4 hidden">
        <div class="card p-5 space-y-4">
            <div class="space-y-2">
                <label class="block mb-2 font-bold opacity-80" style="color: var(--tg-theme-text-color)">Выберите тариф:</label>
                <button onclick="toggleAccordion()" class="w-full text-left p-4 rounded-xl flex justify-between items-center stat-item" style="color: var(--tg-theme-text-color)">
                    <span id="selected-tariff">Выберите...</span>
                    <span>▼</span>
                </button>
                <div id="accordion" class="accordion-content space-y-2 rounded-xl p-2">
                    <button onclick="selectTariff('7', '7 дней - 0.5$')" class="w-full text-left p-3 rounded-lg" style="color: var(--tg-theme-text-color)">7 дней - 0.5$</button>
                    <button onclick="selectTariff('30', '1 месяц - 1.5$')" class="w-full text-left p-3 rounded-lg" style="color: var(--tg-theme-text-color)">1 месяц - 1.5$</button>
                    <button onclick="selectTariff('90', '3 месяца - 4$')" class="w-full text-cl left p-3 rounded-lg" style="color: var(--tg-theme-text-color)">3 месяца - 4$</button>
                    <button onclick="selectTariff('365', '1 год - 12$')" class="w-full text-left p-3 rounded-lg" style="color: var(--tg-theme-text-color)">1 год - 12$</button>
                </div>
            </div>
            <button onclick="buySubscription()" class="button-theme w-full p-5 font-extrabold text-lg shadow-lg">
                💎 Оплатить
            </button>
        </div>
    </div>

    <div id="support" class="tab-content hidden">
        <div class="card p-6 text-center space-y-4">
            <h2 class="text-2xl font-bold" style="color: var(--tg-theme-text-color)">Техническая поддержка</h2>
            <a href="https://t.me/WyerVPNsupportBot" class="button-theme inline-block w-full p-4 font-bold text-base shadow-md">
                💬 Написать боту
            </a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe?.user;

        let hasSubscription = true; // ЛОГИКА ИЗ БАЗЫ
        
        const subDateEl = document.getElementById('sub-date');
        const qrContainer = document.getElementById('qr-container');
        const vlessArea = document.getElementById('vless-link');
        const qrCodeEl = document.getElementById("qrcode");

        function updateSubscriptionUI() {
            if (!hasSubscription) {
                subDateEl.innerText = "Нет активной подписки";
                vlessArea.value = "Сначала купите подписку в разделе 'Купить'!";
                qrContainer.classList.add('hidden');
            } else {
                subDateEl.innerText = "20.03.2026";
                vlessArea.value = "vless://example@77.91.84.106:443?type=grpc&serviceName=grpc#WyerVPN";
                qrContainer.classList.remove('hidden');
                qrCodeEl.innerHTML = "";
                new QRCode(qrCodeEl, { text: vlessArea.value, width: 170, height: 170, correctLevel: QRCode.CorrectLevel.H });
            }
        }
        updateSubscriptionUI();

        if (user) {
            document.getElementById('user-id').innerText = user.id;
            document.getElementById('user-name').innerText = user.first_name || "@" + user.username;
            if (user.photo_url) {
                const avatarImg = document.getElementById('user-avatar');
                const placeholder = document.getElementById('avatar-placeholder');
                avatarImg.src = user.photo_url;
                avatarImg.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('tab-active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        }

        let selectedTariffDays = null;
        function toggleAccordion() {
            const accordion = document.getElementById('accordion');
            accordion.style.maxHeight = accordion.style.maxHeight ? null : accordion.scrollHeight + "px";
        }

        function selectTariff(days, text) {
            selectedTariffDays = days;
            document.getElementById('selected-tariff').innerText = text;
            toggleAccordion();
        }

        // --- ЛОГИКА ОПЛАТЫ (ЧЕРЕЗ БОТА) ---
        function buySubscription() {
            if (!selectedTariffDays) {
                tg.showAlert("Пожалуйста, выберите тариф");
                return;
            }
            
            // Отправляем запрос боту, чтобы он создал инвойс
            tg.sendData(JSON.stringify({action: "create_invoice", days: selectedTariffDays}));
            
            // Бот должен прислать ссылку, но пока закроем окно
            tg.showAlert("Открываю Crypto Bot...");
            setTimeout(() => {
                tg.close();
            }, 1000);
        }
        // ----------------------------------

        function deleteSubscription() {
            if(!hasSubscription) {
                tg.showAlert("У вас нет активной подписки");
                return;
            }
            
            tg.showConfirm("Вы уверены, что хотите удалить подписку?", (success) => {
                if(success) {
                    tg.sendData(JSON.stringify({action: "delete_sub"}));
                    hasSubscription = false;
                    updateSubscriptionUI();
                    tg.showAlert("Подписка удалена");
                }
            });
        }
    </script>
</body>
</html>
