<!DOCTYPE html>

        .btn-primary { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }

<body class="p-4 font-sans">
    
    <div class="card rounded-xl p-4 shadow-lg mb-6 text-center">

        // Получение данных пользователя
        try {
            const user = tg.initDataUnsafe?.user;

                document.getElementById('user-name').innerText = "Привет, " + user.first_name;
            } else {
                document.getElementById('user-name').innerText = "Привет, Пользователь";
            }
        } catch (e) {
            document.getElementById('user-name').innerText = "Привет, Гость";
        }

        // --- Настройка синей кнопки внизу ---
        tg.MainButton.text = "Открыть VPN и подключить"; // Текст на кнопке
        tg.MainButton.color = "#2481cc"; // Синий цвет
        tg.MainButton.textColor = "#ffffff"; // Белый текст
        tg.MainButton.show(); // Показать кнопку

        // --- Действие при нажатии на нижнюю кнопку ---
        tg.MainButton.onClick(function() {
            // Ссылка подписки, которую ты прислал
            const vpnUrl = 'v2raytun://install-config?url=http://77.91.84.106:2096/sub/ego95km8cmaejnni';
            
            // Открываем приложение
            tg.openLink(vpnUrl);
