<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyer VPN - Advanced Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Использование системных цветов Telegram для идеальной интеграции */
        body { 
            background-color: var(--tg-theme-bg-color); 
            color: var(--tg-theme-text-color); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* Стилизация карточек */
        .card { 
            background-color: var(--tg-theme-secondary-bg-color); 
            border-radius: 24px; 
            border: 1px solid rgba(0,0,0,0.05); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        /* Активная вкладка */
        .tab-active { 
            border-bottom: 3px solid var(--tg-theme-button-color); 
            color: var(--tg-theme-button-color); 
            font-weight: bold; 
        }
        
        /* Скругленные кнопки с эффектом нажатия */
        button { 
            border-radius: 9999px; 
            transition: all 0.2s ease; 
        }
        button:active { 
            transform: scale(0.97); 
            opacity: 0.9;
        }
        
        /* Стилизация выпадающих списков и полей */
        select, textarea { 
            background-color: var(--tg-theme-bg-color); 
            color: var(--tg-theme-text-color); 
            border-radius: 16px; 
            border: 1px solid rgba(0,0,0,0.1); 
        }
        
        /* Центрирование QR-кода */
        #qrcode img { 
            margin: 0 auto; 
            display: block; 
        }
    </style>
</head>
<body class="p-4 text-sm">

    <div class="text-center mb-6 pt-2">
        <h1 class="text-4xl font-extrabold text-blue-500 tracking-tighter">Wyer VPN</h1>
        <p class="text-xs opacity-60 mt-1">Центр управления подпиской</p>
    </div>

    <div class="flex justify-around mb-6 border-b border-gray-200">
        <button onclick="showTab('profile')" class="tab-button tab-active p-4 flex-1 text-center" id="btn-profile">👤 Профиль</button>
        <button onclick="showTab('subscription')" class="tab-button p-4 flex-1 text-center" id="btn-subscription">💎 Подписка</button>
    </div>

    <div id="profile" class="tab-content space-y-4">
        <div class="card p-6 space-y-5">
            <div class="flex items-center gap-4">
                <img id="user-avatar" src="" class="rounded-full w-16 h-16 border-4 border-blue-100 hidden" alt="Avatar">
                <div id="avatar-placeholder" class="rounded-full w-16 h-16 border-4 border-blue-100 flex items-center justify-center text-2xl bg-gray-200 font-bold">👤</div>
                <div>
                    <p class="text-2xl font-bold tracking-tight" id="user-name">@username</p>
                    <p class="text-xs opacity-60">ID: <span id="user-id">000000</span></p>
                </div>
            </div>
            
            <div class="border-t border-gray-100 pt-4 space-y-3">
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                    <span class="font-medium">Баланс:</span>
                    <span class="font-bold text-xl text-green-600" id="user-balance">0$</span>
                </div>
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                    <span class="font-medium">Уровень:</span>
                    <span class="font-bold text-lg" id="user-lvl">0</span>
                </div>
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                    <span class="font-medium">Скидка:</span>
                    <span class="font-bold text-lg text-blue-500" id="user-discount">0%</span>
                </div>
            </div>
        </div>
    </div>

    <div id="subscription" class="tab-content space-y-4 hidden">
        <div class="card p-5 space-y-4">
            <div class="text-center bg-blue-50 p-3 rounded-xl">
                <p class="text-sm">Активна до: <span id="sub-date" class="text-blue-700 font-bold">20.03.2026</span></p>
            </div>
            
            <div class="flex justify-center items-center bg-white p-4 rounded-3xl shadow-inner">
                <div id="qrcode"></div>
            </div>
            
            <div>
                <label class="block mb-2 font-bold opacity-80">Ваша ссылка VLESS:</label>
                <textarea id="vless-link" class="w-full p-4 text-xs h-20" readonly></textarea>
            </div>
            
            <div>
                <label class="block mb-2 font-bold opacity-80">Выберите тариф:</label>
                <select id="tariff-select" class="w-full p-4 font-bold text-base">
                    <option value="7">7 дней - 0.5$</option>
                    <option value="30">1 месяц - 1.5$</option>
                    <option value="90">3 месяца - 4$</option>
                    <option value="365">1 год - 12$</option>
                </select>
            </div>
            
            <button onclick="buySubscription()" class="w-full bg-green-500 text-white p-5 font-extrabold text-lg shadow-lg">
                💎 Оплатить
            </button>
        </div>
    </div>

            document.getElementById('user-id').innerText = user.id;
            document.getElementById('user-name').innerText = user.first_name || "@" + user.username;
            if (user.photo_url) {
                const avatarImg = document.getElementById('user-avatar');
                const placeholder = document.getElementById('avatar-placeholder');
                avatarImg.src = user.photo_url;
                avatarImg.classList.remove('hidden');

        }
